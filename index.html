<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fleet Timesheet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --app-bg: var(--tg-theme-secondary-bg-color, #f0f2f5);
      --card-bg: var(--tg-theme-bg-color, #ffffff);
      --text-main: var(--tg-theme-text-color, #1c1c1e);
      --text-muted: var(--tg-theme-hint-color, #8e8e93);
      --input-bg: var(--tg-theme-secondary-bg-color, #f2f2f7);
      --border-color: var(--tg-theme-hint-color, #e5e5ea);
      --primary-accent: var(--tg-theme-button-color, #007aff);
    }
    
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--app-bg); color: var(--text-main); padding: 20px; margin: 0; text-align: center; transition: background-color 0.3s; }
    h2 { margin-top: 0; font-weight: 700; letter-spacing: -0.5px; }
    
    .card { background: var(--card-bg); border-radius: 16px; padding: 24px 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); margin-bottom: 15px; transition: background-color 0.3s; }
    
    .btn { border: none; padding: 16px 20px; font-size: 16px; border-radius: 12px; width: 100%; margin-top: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.7; transform: none; cursor: not-allowed; }
    
    .btn-checkin { background: linear-gradient(135deg, #34c759, #28a745); color: #fff; box-shadow: 0 4px 12px rgba(52,199,89,0.25); }
    .btn-checkout { background: linear-gradient(135deg, #ff3b30, #d70015); color: #fff; box-shadow: 0 4px 12px rgba(255,59,48,0.25); }
    .btn-outline { background: transparent; border: 2px solid var(--border-color); color: var(--text-main); box-shadow: none; }
    .btn-warning { background: linear-gradient(135deg, #ff9500, #e67e22); color: #fff; box-shadow: 0 4px 12px rgba(255,149,0,0.25); }
    
    label { display: block; text-align: left; margin-bottom: 8px; font-weight: 600; font-size: 12px; color: var(--text-muted); margin-top: 20px; text-transform: uppercase; letter-spacing: 0.5px;}
    
    textarea, input[type="datetime-local"] { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid transparent; background-color: var(--input-bg); color: var(--text-main); box-sizing: border-box; font-family: inherit; font-size: 15px; transition: all 0.2s; outline: none; }
    textarea:focus, input[type="datetime-local"]:focus { border-color: var(--primary-accent); box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15); background-color: var(--card-bg); }
    textarea { height: 90px; resize: none; }
    
    .warning-box { background: rgba(255, 149, 0, 0.1); border: 1px solid rgba(255, 149, 0, 0.3); color: #d97d00; border-radius: 12px; padding: 16px; text-align: left; margin-top: 10px; margin-bottom: 15px; font-size: 14px; line-height: 1.4; }
    .warning-box strong { color: #cc7000; }
    @media (prefers-color-scheme: dark) { .warning-box { color: #ffab40; } .warning-box strong { color: #ffb74d; } }

    .screen { display: none; animation: fadeIn 0.3s ease; }
    .screen.active { display: block; }
    
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  
  <div class="card">
      <h2 id="appTitle">ELH Timesheet</h2>
      <p id="userInfo" style="font-size: 14px; color: var(--text-muted);">Initializing connection...</p>
      
      <!-- SCREEN 1: MAIN MENU -->
      <div id="main-menu" class="screen">
          <button class="btn btn-checkin" onclick="handleAction('Check-In', this)">📍 Check-In</button>
          <button class="btn btn-checkout" onclick="handleAction('Check-Out', this)">🏁 Check-Out</button>
      </div>

      <!-- SCREEN 2: OUT OF BOUNDS WARNING -->
      <div id="oob-checkin-view" class="screen">
          <h3 style="color:#e74c3c; margin-top:0;">⚠️ Not in Yard</h3>
          <p style="margin-bottom: 20px;">You are <strong id="oobDist"></strong> meters away from the Yard.</p>
          <button class="btn btn-warning" onclick="submitData('Check-In', this)">Proceed Anyway</button>
          <button class="btn btn-outline" onclick="showScreen('main-menu')">Cancel</button>
      </div>

      <!-- SCREEN 3: CHECKOUT DETAILS -->
      <div id="checkout-view" class="screen">
          <div id="customTimeGroup" class="warning-box" style="display:none;">
             <p style="margin: 0 0 10px 0;"><strong>⚠️ Not in Yard:</strong> Please enter the exact time you finished your shift.</p>
             <input type="datetime-local" id="customTime">
          </div>
          
          <label>Shift Notes (Optional)</label>
          <textarea id="notes" placeholder="Breaks? Shift related notes"></textarea>
          
          <button class="btn btn-checkout" onclick="submitData('Check-Out', this)">Submit Check-Out</button>
          <button class="btn btn-outline" onclick="showScreen('main-menu')">Cancel</button>
      </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwgjtKbemo-ssX23F3aJ_O8I-sEDZb4AfKgapbIATcW4NrSVrPdpUa5DAnAapNZCB-p/exec"; 
    
    let tg = window.Telegram.WebApp;
    tg.expand(); 
    
    const urlParams = new URLSearchParams(window.location.search);
    const driverTgId = urlParams.get('chatId');
    const yardLat = parseFloat(urlParams.get('lat') || 0);
    const yardLon = parseFloat(urlParams.get('lon') || 0);
    const radius = parseFloat(urlParams.get('rad') || 100);
    
    let currentLat = null, currentLon = null;
    let isOob = false;

    window.onload = () => {
       if (!driverTgId) {
          document.getElementById('userInfo').innerText = "⚠️ Error: Please open inside Telegram."; return;
       }
       let driverName = tg.initDataUnsafe?.user?.first_name || "Driver";
       document.getElementById('userInfo').innerText = `Connected as ${driverName}`;
       showScreen('main-menu');
    }

    function showScreen(screenId) {
       document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
       document.getElementById(screenId).classList.add('active');
    }

    function getDistanceInMeters(lat1, lon1, lat2, lon2) {
      if(!lat1 || !lon1 || !lat2 || !lon2) return 999999;
      const R = 6371e3; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // Pass the button element so we can show a spinner inside it
    function handleAction(action, btnElement) {
       let originalText = btnElement.innerHTML;
       btnElement.innerHTML = `<div class="spinner"></div> Acquiring GPS...`;
       btnElement.disabled = true;
       
       if (navigator.geolocation) {
           navigator.geolocation.getCurrentPosition(
               (pos) => {
                   btnElement.innerHTML = originalText;
                   btnElement.disabled = false;
                   
                   currentLat = pos.coords.latitude; currentLon = pos.coords.longitude;
                   let dist = getDistanceInMeters(currentLat, currentLon, yardLat, yardLon);
                   isOob = dist > radius;
                   
                   if (action === 'Check-In') {
                       if (isOob) {
                           document.getElementById('oobDist').innerText = Math.round(dist);
                           showScreen('oob-checkin-view');
                       } else submitData('Check-In', btnElement);
                   } else {
                       if (isOob) {
                           document.getElementById('customTimeGroup').style.display = 'block';
                           let now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                           document.getElementById('customTime').value = now.toISOString().slice(0,16);
                       } else document.getElementById('customTimeGroup').style.display = 'none';
                       showScreen('checkout-view');
                   }
               },
               (err) => { 
                   btnElement.innerHTML = originalText;
                   btnElement.disabled = false;
                   tg.showAlert("❌ Location access denied."); 
               },
               { enableHighAccuracy: true, timeout: 10000 }
           );
       } else { 
           btnElement.innerHTML = originalText;
           btnElement.disabled = false;
           tg.showAlert("❌ Geolocation not supported."); 
       }
    }

    function submitData(action, btnElement) {
       if(btnElement) {
           btnElement.innerHTML = `<div class="spinner"></div> Saving...`;
           btnElement.disabled = true;
       }
       
       let payload = {
           type: "miniapp", chatId: driverTgId, action: action, lat: currentLat, lon: currentLon,
           notes: document.getElementById('notes').value,
           customTime: isOob && action === 'Check-Out' ? document.getElementById('customTime').value : null
       };

       let safeData = encodeURIComponent(JSON.stringify(payload));
       let finalUrl = GAS_URL + "?miniapp_data=" + safeData;

       // MAGIC BULLET: mode: 'no-cors' forces Apple devices to send the data without waiting for read permissions!
       fetch(finalUrl, { mode: 'no-cors' })
       .then(() => {
           tg.close(); 
       })
       .catch(err => { 
           if(btnElement) { btnElement.innerHTML = "Retry"; btnElement.disabled = false; }
           tg.showAlert("❌ Connection error. Please try again."); 
       });
    }
  </script>
</body>
</html>
